name: test

on:
  push:
    branches:
    - master
  pull_request:

jobs:
  test-crdb:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - crdbversion: 24.3
            crdb_image_tag: latest-v24.3
          - crdbversion: 25.2
            crdb_image_tag: latest-v25.2
          - crdbversion: 25.4
            crdb_image_tag: latest-v25.4
          - crdbversion: 26.1
            crdb_image_tag: latest-v26.1

    env:
      CRDBVERSION: ${{ matrix.crdbversion }}
      CRDB_IMAGE_TAG: ${{ matrix.crdb_image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: test
        run: make test

      - name: vet
        run: make vet

      - name: testacc_crdb
        run: make testacc_crdb
